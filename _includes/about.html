<h2>About</h2>
<div class="container" id="about">
  <div class="card">
    <div class="card-body about-card-body">
      {% for item in site.data.about %}
      <div class="about-bio text-center">
        <p class="bio-text">{{ item.bio1 }}</p>
        <div class="about-meta">
          <span><b>{{ item.name }}</b></span>
          <span class="meta-sep">·</span>
          <span>{{ item.email }}</span>
          {% if item.funfact %}
          <span class="meta-sep">·</span>
          <span>{{ item.funfact }}</span>
          {% endif %}
        </div>
      </div>
      <div class="row text-center mt-4">
        <div class="col-md-6 col-12 mb-3">
          <img
            id="github_languages"
            alt="Most used languages on GitHub"
            class="img-fluid"
            src="https://github-readme-stats.vercel.app/api/top-langs/?username={{ site.social.github_username }}&langs_count=4&theme=default"
          />
        </div>
        <div class="col-md-6 col-12 mb-3">
          <img
            id="github_stats"
            alt="GitHub statistics (Total Stars, Total Commits, Total PRs, Total Issues, Contributed to)"
            class="img-fluid"
            src="https://github-readme-stats.vercel.app/api?username={{ site.social.github_username }}&show_icons=true&theme=default"
          />
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

<style>
  .about-card-body {
    width: 100%;
    padding: 24px;
  }
  .about-bio {
    padding: 0 20px;
  }
  .bio-text {
    font-size: 1.05em;
    line-height: 1.9;
    max-width: 680px;
    margin: 0 auto 16px;
    opacity: 0.9;
    text-align: center;
  }
  .about-meta {
    font-size: 0.88em;
    opacity: 0.65;
    margin-top: 6px;
    text-align: center;
  }
  .meta-sep {
    margin: 0 10px;
  }
</style>
