<h2>Work Experience</h2>
<div class="container" id="experience">
  {% for item in site.data.experience %}
  <div class="card experience-card transform">
    <div class="icon">
      <img src="./assets/img/experience/{{ item.logo }}" alt="{{ item.company }} logo"/>
    </div>
    <div class="info" style="flex:1;">
      <p class="title">{{ item.role }}</p>
      <p class="location">{{ item.company }} &mdash; {{ item.location }}</p>
      <p class="dates">{{ item.dates }}</p>
      {% if item.summary %}
      <p class="exp-summary">{{ item.summary }}</p>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>

<style>
  .experience-card {
    flex-direction: row;
    align-items: flex-start;
    margin: 16px 0;
  }
  .experience-card .icon {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    margin-right: 20px;
    margin-top: 4px;
    padding: 6px;
  }
  .exp-summary {
    margin-top: 8px;
    font-size: 0.88em;
    line-height: 1.6;
    opacity: 0.82;
  }
  @media (max-width: 576px) {
    .experience-card {
      flex-direction: column;
    }
    .experience-card .icon {
      margin-right: 0;
      margin-bottom: 10px;
    }
  }
</style>
